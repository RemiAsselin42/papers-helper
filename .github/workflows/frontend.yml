name: Frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  pull_request:
    branches: [main]
    paths: ["frontend/**"]

defaults:
  run:
    working-directory: frontend

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to pnpm 11 to match frontend/package.json `packageManager`.
      # An explicit version is required: action-setup only reads
      # `packageManager` from a repo-root package.json, which this two-tier
      # repo doesn't have (it lives in frontend/).
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to pnpm 11 to match frontend/package.json `packageManager`.
      # An explicit version is required: action-setup only reads
      # `packageManager` from a repo-root package.json, which this two-tier
      # repo doesn't have (it lives in frontend/).
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
